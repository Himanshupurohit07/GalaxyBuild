#Aero integration property definition model reference:
# Model sample (no options, simplest form): flex-attribute-internal-name (use commas to separate between multiple attributes)
# Model sample (w/options): flex-attribute-internal-name|option1:value1|option2:value2 (use comma to separate between multiple attributes, pipe to separate between attribute options, and colon to separate betwen option-key and option-value).
# Supported attribute options:
# - alias (json alias name), of type <string>. If no alias is defined, then the internal attribute name is used instead.
# - enumskey (use enum's secondary key), of type <boolean> (true or false). Default value is false.
# - enumskeyaero (use enum's aero secondary key), of type <boolean> (true or false). Default value is false.
# - enumdpname (use enum's display name), of type <boolean> (true or false). Default value is false. If enumskey is set to true, then this will execute if no secondary key value is found.
# - enumattrkeys (enum's attribute keys), of type <string>. Default value is null. Searches the value thru the given Enum's attribute key(s) in the order given (use '->' as separator).
# - lockupd (lock attribute update), of type <boolean> (true or false). Default value is false. This is used from integration's plugin only.
# - objpath (object path), of type <string>. Default value is null. A list of linked/chained objects references separated by '->' where the attribute value to retrieve is located at.
# - objrefpath (object reference flex path), of type <string>. Default value is null. A flex path to an object reference. To use during reverse value lookup.
# - objrefattr (object reference flex attr name), of type <string>. Default value is null. A flex internal attribute name. To use during reverse value lookup in combination with objrefpath.
# - placeholder, of type <boolean>. Default value is false. A dummy/placeholder attribute. The respective integration code must assign a value to it.
# - formatstr, of type <string>. Default value is null. A string format as supported by java.util.Formatter.
# - formatclass, of type <string>. Default value is null. Converts the value to format to the given class before applying the format. Supported options are: Integer, Long, Float and Double.
# - noblanks, of type <boolean>. Default value is false. Set to allow or not blank values when saving/updating felx object related to aero integrations. Use by integration plugins and article CAP update.
# - compvaluedelimiterkey, of type <string>. Default value is null. Set to one of the available keys at com.sparc.wc.integration.util.SparcCompositeDelimiters, to replace the default delimiter used by flex.

